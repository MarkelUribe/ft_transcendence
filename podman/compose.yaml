services:
  db:
    build: ./postgresql
    container_name: psql_transcendence
    restart: always
    environment:
      POSTGRES_USER: myuser 
      POSTGRES_PASSWORD: mypassword 
      POSTGRES_DB: transcendence
    ports:
      - "55555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./nest
    container_name: nest_backend
    restart: always
    depends_on:
      - db
    environment:
      # NestJS debe usar el nombre del servicio "db", no "localhost"
      DATABASE_URL: postgresql://myuser:mypassword@db:5432/transcendence
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build: ./svelte
    container_name: svelte_frontend
    restart: always
    depends_on:
      - backend
    environment:
      # URL para que el navegador del usuario encuentre el backend
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
