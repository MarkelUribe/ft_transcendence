<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Status Page | ft_transcendence</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --green: #22c55e;
            --red: #ef4444;
        }
        body { 
            font-family: system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 40px;
        }
        .container { width: 100%; max-width: 500px; }
        .card { 
            background: var(--card); border-radius: 12px; padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .service {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-bottom: 1px solid #334155;
        }
        .service:last-child { border-bottom: none; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-up { background-color: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-down { background-color: var(--red); box-shadow: 0 0 8px var(--red); }
        .badge { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .info { margin-top: 20px; font-size: 0.85rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-top: 0;">System Status</h2>
        
        <!-- Frontend -->
        <div class="service">
            <span>Svelte Frontend</span>
            <div>
                <span class="dot status-up"></span>
                <span class="badge" style="color: var(--green)">Running</span>
            </div>
        </div>

        <!-- Backend (NestJS) -->
        <div class="service">
            <span>NestJS Backend</span>
            <div id="status-backend">
                <span class="dot" style="background: #64748b;"></span>
                <span class="badge" style="color: #64748b">Checking...</span>
            </div>
        </div>

        <!-- MariaDB (vía API) -->
        <div class="service">
            <span>MariaDB Database</span>
            <div id="status-db">
                <span class="dot" style="background: #64748b;"></span>
                <span class="badge" style="color: #64748b">Checking...</span>
            </div>
        </div>

        <div class="info">
            Refresco automático cada 10s • <span id="clock">00:00:00</span>
        </div>
    </div>
</div>

<script>
    // Configura aquí las URLs de tus contenedores
    const BACKEND_URL = "http://localhost:3000/api/health"; 

    async function checkHealth() {
        const backendDiv = document.getElementById('status-backend');
        const dbDiv = document.getElementById('status-db');
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();

        try {
            // 1. Intentamos conectar con el Backend
            const res = await fetch(BACKEND_URL, { mode: 'cors' });
            
            if (res.ok) {
                setUI(backendDiv, true, "Online");
                // 2. Si el backend responde, él nos dirá si la DB está bien
                // Asumiendo que tu endpoint de health devuelve { db: "UP" }
                const data = await res.json();
                setUI(dbDiv, data.db === "UP", data.db === "UP" ? "Online" : "Error");
            } else {
                throw new Error();
            }
        } catch (e) {
            setUI(backendDiv, false, "Offline");
            setUI(dbDiv, false, "Unreachable");
        }
    }

    function setUI(element, isUp, text) {
        element.innerHTML = `
            <span class="dot ${isUp ? 'status-up' : 'status-down'}"></span>
            <span class="badge" style="color: var(--${isUp ? 'green' : 'red'})">${text}</span>
        `;
    }

    // Iniciar
    checkHealth();
    setInterval(checkHealth, 10000);
</script>

</body>
</html>
