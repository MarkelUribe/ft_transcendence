# Dev-only overrides. Use together with compose.yaml:
#   podman-compose -f ./srcs/compose.yaml -f ./srcs/compose.dev.yaml up

services:
  db:
    ports: []

  backend:
    restart: "no"
    build:
      context: ./requirements/nest
      target: dev
    volumes:
      - ./requirements/nest:/app
      - backend_node_modules:/app/node_modules
      - ../secrets/db_password.txt:/run/secrets/db_password:ro
      - ../secrets/jwt_secret.txt:/run/secrets/jwt_secret:ro
      - ../secrets/ssl/localhost.crt:/run/secrets/ssl_cert:ro
      - ../secrets/ssl/localhost.key:/run/secrets/ssl_key:ro
    environment:
      PORT: "3000"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    command:
      - sh
      - -lc
      - |
        if [ ! -x node_modules/.bin/nest ]; then
          echo "[backend]  | Installing dependencies into node_modules volume...";
          npm ci --include=dev;
        fi;
        exec npm run start:dev

  frontend:
    restart: "no"
    volumes:
      - ./requirements/svelte:/app
      - frontend_node_modules:/app/node_modules
      - ../secrets/ssl/localhost.crt:/run/secrets/ssl_cert:ro
      - ../secrets/ssl/localhost.key:/run/secrets/ssl_key:ro
    environment:
      VITE_API_URL: https://localhost:3000
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - |
        if [ ! -x node_modules/.bin/vite ]; then
          echo "[frontend] | Installing dependencies into node_modules volume...";
          npm ci --include=dev;
        fi;
        exec npm run dev -- --host

volumes:
  backend_node_modules:
  frontend_node_modules:
