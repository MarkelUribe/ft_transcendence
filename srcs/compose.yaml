version: "3.8"

services:
  db:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: always
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      # IMPORTANTE: Usamos _FILE para que MariaDB lea el contenido del archivo
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
      # Usamos esto en lugar de 'secrets:' para aplicar el :Z de SELinux
      - ../secrets/db_password.txt:/run/secrets/db_password:ro,Z
      - ../secrets/db_root_password.txt:/run/secrets/db_root_password:ro,Z
    networks:
      - transcendence_net
    healthcheck:
      # Avoid log spam: authenticate using the root password stored in the mounted secret file.
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$(cat /run/secrets/db_root_password)\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./requirements/nest
    container_name: nest_backend
    restart: always
    depends_on:
      db: 
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - PORT=3000
    volumes:
      - ../secrets/db_password.txt:/run/secrets/db_password:ro,Z
      - ../secrets/jwt_secret.txt:/run/secrets/jwt_secret:ro,Z
      - ../secrets/ssl/localhost.crt:/run/secrets/ssl_cert:ro,Z
      - ../secrets/ssl/localhost.key:/run/secrets/ssl_key:ro,Z
      
    ports:
      - "3000:3000"
    networks:
      - transcendence_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./requirements/svelte
    container_name: svelte_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      VITE_API_URL: https://localhost:3000
    volumes:
      - ../secrets/ssl/localhost.crt:/run/secrets/ssl_cert:ro,Z
      - ../secrets/ssl/localhost.key:/run/secrets/ssl_key:ro,Z
    ports:
      - "5173:5173"
    networks:
      - transcendence_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5173"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:

networks:
  transcendence_net:
    driver: bridge
