version: "3.8"

services:
  prometheus:
    image: requirements/prom/prometheus:latest
    container_name: prometheus_standalone
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
    networks:
      - transcendence_net

  grafana:
    image: requirements/grafana/grafana:latest
    container_name: grafana_standalone
    ports:
      - "3001:3001"
    networks:
      - transcendence_net

networks:
  transcendence_net:
    external: true
